name: Build & Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Ini akan jadi ghcr.io/username/repo
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 1. BUILD & PUSH PHP (MAIN APP)
      - name: Extract metadata for PHP
        id: meta-php
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: Build and push PHP
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta-php.outputs.tags }}
          labels: ${{ steps.meta-php.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 2. BUILD & PUSH BACKUP
      - name: Extract metadata for Backup
        id: meta-backup
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}-backup
          tags: |
            type=raw,value=latest

      - name: Build and push Backup
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backup/Dockerfile
          push: true
          tags: ${{ steps.meta-backup.outputs.tags }}
          labels: ${{ steps.meta-backup.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 3. BUILD & PUSH NGINX
      - name: Extract metadata for Nginx
        id: meta-nginx
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}-nginx
          tags: |
            type=raw,value=latest

      - name: Build and push Nginx
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/nginx/Dockerfile
          push: true
          tags: ${{ steps.meta-nginx.outputs.tags }}
          labels: ${{ steps.meta-nginx.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max