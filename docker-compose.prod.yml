services:
  nginx:
    image: ${NGINX_IMAGE}
    container_name: toko_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      - php
    networks:
      - toko_network

  php:
    image: ${DOCKER_IMAGE}
    container_name: toko_php
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
    env_file:
      - .env
    environment:
      - DB_HOST=db  # Memaksa host ke nama service database
    depends_on:
      db:
        condition: service_healthy
    networks:
      - toko_network

  db:
    image: mariadb:10.11
    container_name: toko_mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME}
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/mysql
      # OTOMATIS IMPORT SQL DUMP SAAT PERTAMA KALI JALAN
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${DB_PASS} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - toko_network

  backup:
    image: ${BACKUP_IMAGE}
    container_name: toko_backup
    restart: unless-stopped
    volumes:
      - ./backups:/backups
    env_file:
      - .env
    environment:
      - DB_HOST=db  # Harus arahkan ke container database
      - DB_USER=root
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - toko_network

volumes:
  db_data:
  app_data:

networks:
  toko_network:
    driver: bridge
    name: toko_network  # Mengunci nama agar tidak ditambah prefix folder (pdk_...)